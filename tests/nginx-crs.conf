load_module "/usr/lib/nginx/modules/ngx_http_coraza_module.so";

worker_processes 1;
pid /tmp/nginx-crs.pid;

events {
    worker_connections 64;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    error_log /tmp/nginx-crs-error.log info;
    access_log /tmp/nginx-crs-access.log;

    coraza on;
    coraza_rules '
        SecRuleEngine On
        SecRequestBodyAccess On
        SecResponseBodyAccess On
        SecResponseBodyMimeType text/plain text/html text/xml application/json

        SecAction "id:900000,phase:1,nolog,pass,t:none,\
            setvar:tx.blocking_paranoia_level=1,\
            setvar:tx.detection_paranoia_level=1,\
            setvar:tx.crs_validate_utf8_encoding=1,\
            setvar:tx.arg_name_length=100,\
            setvar:tx.arg_length=400,\
            setvar:tx.total_arg_length=64000,\
            setvar:tx.max_num_args=255,\
            setvar:tx.max_file_size=64100,\
            setvar:tx.combined_file_sizes=65535"

        SecAction "id:900200,phase:1,pass,t:none,nolog,\
            setvar:'\''tx.allowed_methods=GET HEAD POST OPTIONS PUT DELETE'\''"

        Include /tmp/crs/crs-setup.conf.example
        Include /tmp/crs/rules/*.conf
    ';

    server {
        listen 8080;
        server_name localhost;

        root /tmp/htdocs;

        location / {
            try_files $uri $uri/ =200;
        }

        error_page 403 405 =403 @blocked;
        location @blocked {
            return 403 "Access Denied\n";
        }
    }
}
